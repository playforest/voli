[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "build",
  "dist",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.poetry]
name = "options-query-agent"
version = "0.1.0"
description = "Options Chain Q&A Agent"
authors = ["Your Name <you@example.com>"]
packages = [{ include = "oqe", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"
pydantic = "^2.0"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"
