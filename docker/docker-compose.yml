# docker compose -f docker/docker-compose.yml run --rm voli ask "NVDA ATM IV this week vs next week"
#
# Mounts your local .env (so POLYGON_API_KEY is picked up) and a named volume
# for the SQLite cache + JSONL traces so they survive between runs.

services:
  voli:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: voli:latest
    env_file:
      - ../.env
    volumes:
      - voli-data:/root/.voli
    # Default: print help. Override on the command line, e.g.:
    #   docker compose run --rm voli ask "NVDA ATM IV this week"
    command: ["--help"]

volumes:
  voli-data:
